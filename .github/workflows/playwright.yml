name: Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allows this workflow to be called by publish.yml

jobs:
  playwright:
    name: Playwright (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]"

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/3
        env:
          CI: true
          DATABASE_TYPE: sqlite
          SQLITE_PATH: ./test-expenses-${{ matrix.shard }}.db
          SECRET_KEY: ci-test-secret-key-${{ matrix.shard }}
          ENABLE_TEST_ROUTES: "1"

      - name: Upload blob report for merge
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-blob-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-failures-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  merge-reports:
    name: Merge Playwright Reports
    if: always()
    needs: playwright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Node dependencies
        run: npm ci

      - name: Download blob reports from all shards
        uses: actions/download-artifact@v8
        with:
          pattern: playwright-blob-shard-*
          merge-multiple: true
          path: all-blob-reports/

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
