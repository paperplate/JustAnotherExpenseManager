name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Call the reusable test workflows ─────────────────────────────────────
  run-pytest:
    name: Pytest
    uses: ./.github/workflows/pytest.yml

  run-playwright:
    name: Playwright
    uses: ./.github/workflows/playwright.yml

  # ── Build & publish only if both pass ────────────────────────────────────
  docker:
    name: Build & Publish Docker Image
    needs: [run-pytest, run-playwright]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag every push to main as :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag version releases as :v1.2.3 and :1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Always tag the short commit SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
